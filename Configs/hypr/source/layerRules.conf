layerrule {
	name = rofi_laucher_blur
	blur = on
	match:namespace = rofi
}

layerrule {
	name = waybar_blur
	blur = on
	match:namespace = waybar
}

layerrule {
  name = noctalia
  match:namespace = ^noctalia-(bar-.+|notification|dock|panel|attached-panel|osd)$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

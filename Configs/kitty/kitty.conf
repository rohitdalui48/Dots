include ~/.config/kitty/colors.conf
# Fonts
font_family      family="CaskaydiaMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto

# User Experience
input_delay 3
cursor_trail 10
cursor_trail_decay 0.15 0.4
cursor_trail_start_threshold 2

# Window 
window_padding_width 10
confirm_os_window_close 0
allow_remote_control yes

# Tab bar
tab_bar_edge top
tab_bar_margin_width 4
tab_bar_margin_height 4 4
tab_bar_style powerline

# Keybinds
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+l next_tab
map ctrl+h previous_tab


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
